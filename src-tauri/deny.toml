# cargo-deny configuration — license auditing, duplicate dep detection, advisory DB.
# Run locally: cargo deny check
# `npm run verify` runs this when cargo-deny is installed.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# cargo-deny 0.20 treats vulnerabilities and notices as errors by default.
# Fail unmaintained advisories only for direct workspace dependencies. Every
# transitive cargo-audit warning is separately path-locked and time-bounded by
# scripts/rust-advisory-baseline.json; GTK3 remains a Linux Tauri boundary.
unmaintained = "workspace"
yanked = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "0BSD",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["Unicode-3.0"]
name = "unicode-ident"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
