# cargo-deny configuration — license auditing, duplicate dep detection, advisory DB.
# Run locally: cargo deny check
# CI runs this automatically on every push/PR.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "0BSD",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
]
copyleft = "deny"
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["Unicode-3.0"]
name = "unicode-ident"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
