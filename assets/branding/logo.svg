<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="globeGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="55%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1929"/>
    </radialGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>
  </defs>

  <!-- Background disc (transparent rounded square) -->
  <rect x="48" y="48" width="928" height="928" rx="120" fill="#1e1e2e"/>

  <!-- Earth globe -->
  <circle cx="512" cy="512" r="360" fill="url(#globeGradient)" stroke="#cdd6f4" stroke-width="6"/>

  <!-- Concentric tsunami wavefronts -->
  <circle cx="512" cy="512" r="200" fill="none" stroke="url(#waveGradient)" stroke-width="14" opacity="0.85"/>
  <circle cx="512" cy="512" r="280" fill="none" stroke="url(#waveGradient)" stroke-width="10" opacity="0.65"/>
  <circle cx="512" cy="512" r="360" fill="none" stroke="url(#waveGradient)" stroke-width="6" opacity="0.45"/>

  <!-- Impact / source point -->
  <circle cx="512" cy="512" r="34" fill="#f9e2af" stroke="#11111b" stroke-width="6"/>

  <!-- A stylized wave crest at the bottom -->
  <path d="M 200 760 Q 312 700 424 760 T 648 760 T 872 760"
        fill="none" stroke="#74c7ec" stroke-width="22" stroke-linecap="round" opacity="0.85"/>
</svg>
