<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e1e2e" />
    <title>TsunamiSimulator</title>
    <script>
      // Apply persisted theme synchronously before the React tree mounts
      // so the user never sees a Mocha→Latte (or vice-versa) flash.
      // Mirrors `LS_PREFIX + "theme"` from src/lib/settings.ts.
      (function () {
        try {
          var raw = localStorage.getItem("tsunamisim.theme");
          var theme = raw ? JSON.parse(raw) : "mocha";
          if (theme === "mocha" || theme === "latte") {
            document.documentElement.setAttribute("data-theme", theme);
          }
        } catch (_) {
          /* localStorage unavailable; default Mocha will apply via CSS */
        }
      })();
    </script>
  </head>
  <body>
    <noscript>
      <p style="padding:24px;font-family:system-ui,sans-serif">
        TsunamiSimulator requires JavaScript. If you're seeing this inside
        the desktop app, the WebView failed to bootstrap — please reinstall.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
