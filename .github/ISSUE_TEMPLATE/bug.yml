name: Bug report
description: Report a defect, crash, incorrect physics output, or UI glitch
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Reproducible reports get fixed first.

  - type: input
    id: version
    attributes:
      label: TsunamiSimulator version
      description: Found in the header of the app, or in `package.json`.
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (other)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: |
        What did you do? Be explicit — "click Chicxulub preset, drag timeline to 30 min, observe X".
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      description: If you can open the dev tools, paste the JS console errors. For Rust panics, paste the terminal output.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
