name: Installed Windows release gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      webview2_preview:
        description: Prefer an installed WebView2 preview channel over Stable
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: installed-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  installed-windows-release:
    name: MSI and NSIS installed journey
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      CI: "true"
      CATACLYSM_INSTALL_SMOKE_ISOLATED: "1"
      CATACLYSM_WEBVIEW2_PREVIEW: ${{ inputs.webview2_preview && '1' || '0' }}
      CATACLYSM_CAPTURE_PHASE_TIMEOUT_MS: "180000"
      CATACLYSM_CAPTURE_SCENE_TIMEOUT_MS: "600000"
      CATACLYSM_CAPTURE_TOTAL_TIMEOUT_MS: "5400000"

    steps:
      - name: Check out release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action, pinned
        with:
          toolchain: 1.91.0

      - name: Fetch locked Rust dependencies for offline policy checks
        run: cargo fetch --locked --manifest-path src-tauri/Cargo.toml

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Chromium for renderer verification
        run: npx playwright install chromium

      - name: Restore compiled release tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin
          key: windows-release-tools-v3-audit-0.22.2-deny-0.20.2-about-0.9.1-tauri-driver-2.0.6

      - name: Install Rust policy and Tauri WebDriver tools
        shell: pwsh
        run: |
          if (-not (Test-Path "$HOME/.cargo/bin/cargo-audit.exe")) { cargo install cargo-audit --version 0.22.2 --locked }
          if (-not (Test-Path "$HOME/.cargo/bin/cargo-deny.exe")) { cargo install cargo-deny --version 0.20.2 --locked }
          if (-not (Test-Path "$HOME/.cargo/bin/cargo-about.exe")) { cargo install cargo-about --version 0.9.1 --locked --features cli }
          if (-not (Test-Path "$HOME/.cargo/bin/tauri-driver.exe")) { cargo install tauri-driver --version 2.0.6 --locked }
          if (-not (Test-Path "$HOME/.cargo/bin/msedgedriver-tool.exe")) { cargo install --git https://github.com/chippers/msedgedriver-tool --rev 8c4b34f51b45f5cf08013366d703de464ab871d1 }
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $edgeDriver = (Resolve-Path ".\msedgedriver.exe").Path
          "TAURI_DRIVER_PATH=$HOME/.cargo/bin/tauri-driver.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MSEDGEDRIVER_PATH=$edgeDriver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and exercise installed packages
        run: npm run tauri:build

      - name: Upload installed-journey evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installed-release-smoke-${{ runner.arch }}
          path: src-tauri/target/release/bundle/installed-smoke/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload failed reference-capture evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reference-capture-failure-${{ runner.arch }}
          path: artifacts/visual-reference/latest/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload verified Windows packages
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cataclysm-windows-${{ runner.arch }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/cataclysm-build-manifest.json
          if-no-files-found: error
          retention-days: 14
