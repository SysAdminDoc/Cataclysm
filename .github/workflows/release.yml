name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g. v0.1.0). Will be created if it doesn't exist."
        required: true
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  prepare:
    name: Create or verify tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: set
        run: |
          tag="${{ inputs.tag }}"
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag"
            git push origin "$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform.label }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest, label: linux-x86_64 }
          - { os: windows-latest, label: windows-x86_64 }
          - { os: macos-latest, label: macos-universal }
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux WebKit deps
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.os == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps
        run: npm ci

      - name: Build (Tauri)
        env:
          # Cesium ion token is intentionally NOT injected here. End users
          # paste their own free token in the Settings UI; bundling a
          # maintainer token would violate Cesium ion T&Cs and exhaust the
          # free-tier quota.
          VITE_CESIUM_TOKEN: ""
        run: npm run tauri build -- ${{ matrix.platform.os == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          # macOS GitHub Actions ships bash 3.2 (no globstar/**), so use find.
          find src-tauri/target -path "*release/bundle*" \( \
              -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \
              -o -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" \
              -o -name "*.zip" -o -name "*.tar.gz" \
            \) -exec cp {} artifacts/ \;
          ls -la artifacts/ || true

      - uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.platform.label }}
          path: artifacts/
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -la release/
      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          prerelease="${{ inputs.prerelease }}"
          flags=""
          if [ "$prerelease" = "true" ]; then flags="--prerelease"; fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" release/* --title "$tag" --generate-notes $flags
          fi
