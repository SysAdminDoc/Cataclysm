name: Verification

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Full source verification
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      CI: "true"

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Set up minimum supported Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action, pinned
        with:
          toolchain: 1.91.0
          components: clippy

      - name: Restore compiled policy tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin
          key: windows-ci-tools-v1-audit-0.22.2-deny-0.20.2

      - name: Install verification dependencies
        shell: pwsh
        run: |
          npm ci
          npx playwright install chromium
          if (-not (Test-Path "$HOME/.cargo/bin/cargo-audit.exe")) { cargo install cargo-audit --version 0.22.2 --locked }
          if (-not (Test-Path "$HOME/.cargo/bin/cargo-deny.exe")) { cargo install cargo-deny --version 0.20.2 --locked }

      - name: Run full source gate
        run: npm run verify
