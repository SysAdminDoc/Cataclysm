name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Vite production build
        run: npx vite build

      - name: Upload web dist (debug)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: web-dist-${{ github.run_id }}
          path: dist/
          if-no-files-found: ignore

  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: ESLint
        run: npm run lint

  e2e:
    name: Playwright smoke test
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build for preview
        run: npx vite build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore

  rust:
    name: Rust backend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux WebKit deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps (needed for vite build invoked by tauri build)
        run: npm ci

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --release

      - name: cargo clippy (default features)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo clippy (gpu feature)
        if: matrix.os != 'ubuntu-latest'
        working-directory: src-tauri
        run: cargo clippy --all-targets --features gpu -- -D warnings

  validation:
    name: Physics validation benchmarks
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Run validation benchmarks
        working-directory: src-tauri
        run: cargo test --release --features validation -- validation::

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        working-directory: src-tauri
        # Fail-on-vuln as of v0.3.0. Baseline was clean at v0.2.1; any
        # future Dependabot bump or transitive-dep pickup that introduces
        # a known-vulnerable crate will now block CI loudly. To unblock
        # an emergency merge with a known-good waiver, add an `--ignore
        # RUSTSEC-XXXX-XXXX` line here and document the rationale in
        # the commit message.
        run: cargo audit

  deny:
    name: cargo deny (licenses + bans + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: src-tauri/Cargo.toml
