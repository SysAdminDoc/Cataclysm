name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Vite production build
        run: npx vite build

      - name: Upload web dist (debug)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: web-dist-${{ github.run_id }}
          path: dist/
          if-no-files-found: ignore

  rust:
    name: Rust backend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux WebKit deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps (needed for vite build invoked by tauri build)
        run: npm ci

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --release

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        working-directory: src-tauri
        # Fail-on-vuln as of v0.3.0. Baseline was clean at v0.2.1; any
        # future Dependabot bump or transitive-dep pickup that introduces
        # a known-vulnerable crate will now block CI loudly. To unblock
        # an emergency merge with a known-good waiver, add an `--ignore
        # RUSTSEC-XXXX-XXXX` line here and document the rationale in
        # the commit message.
        run: cargo audit
